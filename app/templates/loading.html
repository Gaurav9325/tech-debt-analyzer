<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analyzing — TechDebt</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#05050a; font-family:'Inter',sans-serif; color:white; min-height:100vh; cursor:none; display:flex; align-items:center; justify-content:center; overflow:hidden; }

    .cursor { position:fixed; width:10px; height:10px; background:white; border-radius:50%; pointer-events:none; z-index:9999; }
    .cursor-follower { position:fixed; width:30px; height:30px; border:1px solid rgba(255,255,255,0.2); border-radius:50%; pointer-events:none; z-index:9998; }

    .glow-bg {
      position:fixed; inset:0; z-index:-1;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(99,40,255,0.1) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(0,180,255,0.07) 0%, transparent 60%);
      animation: bgPulse 6s ease-in-out infinite alternate;
    }
    @keyframes bgPulse { 0%{opacity:0.7;} 100%{opacity:1;} }

    nav {
      position:fixed; top:0; left:0; right:0; z-index:100;
      padding:1.2rem 2.5rem; display:flex; justify-content:space-between; align-items:center;
      backdrop-filter:blur(12px); background:rgba(5,5,10,0.6);
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .nav-logo { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; display:flex; align-items:center; gap:0.5rem; }
    .nav-logo .accent { color:rgba(99,40,255,0.9); }
    .nav-logo .nav-sep { color:rgba(255,255,255,0.15); }
    .nav-logo .nav-page { font-family:'Inter',sans-serif; font-size:0.85rem; font-weight:500; color:rgba(255,255,255,0.4); }

    .container { text-align:center; padding:2rem; max-width:560px; width:100%; }

    /* Spinner */
    .spinner-wrap { position:relative; width:80px; height:80px; margin:0 auto 2rem; }
    .spinner-ring {
      position:absolute; inset:0; border-radius:50%; border:2px solid transparent;
      animation: spin 1.4s linear infinite;
    }
    .spinner-ring:nth-child(1) { border-top-color:rgba(99,40,255,0.8); animation-duration:1.4s; }
    .spinner-ring:nth-child(2) { inset:8px; border-right-color:rgba(0,180,255,0.6); animation-duration:1.8s; animation-direction:reverse; }
    .spinner-ring:nth-child(3) { inset:16px; border-bottom-color:rgba(255,255,255,0.2); animation-duration:2.2s; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner-icon { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:1.4rem; }

    .title { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; letter-spacing:-0.5px; margin-bottom:0.5rem; }
    .repo-name { font-size:0.82rem; color:rgba(99,40,255,0.7); font-family:monospace; margin-bottom:2rem; word-break:break-all; }

    /* Steps */
    .steps { display:flex; flex-direction:column; gap:0.5rem; margin-bottom:2rem; text-align:left; }
    .step {
      display:flex; align-items:center; gap:0.8rem;
      padding:0.7rem 1rem; border-radius:10px;
      background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05);
      font-size:0.83rem; color:rgba(255,255,255,0.35);
      transition:all 0.4s ease;
    }
    .step.active { background:rgba(99,40,255,0.06); border-color:rgba(99,40,255,0.2); color:white; }
    .step.done   { background:rgba(0,196,122,0.05); border-color:rgba(0,196,122,0.15); color:rgba(0,196,122,0.8); }
    .step-icon { font-size:1rem; flex-shrink:0; }
    .step-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.15); flex-shrink:0; transition:background 0.4s; }
    .step.active .step-dot { background:rgba(99,40,255,0.9); box-shadow:0 0 8px rgba(99,40,255,0.5); }
    .step.done   .step-dot { background:#00c47a; }

    /* Progress bar */
    .progress-wrap { background:rgba(255,255,255,0.05); border-radius:999px; height:4px; overflow:hidden; margin-bottom:1rem; }
    .progress-bar { height:100%; background:linear-gradient(90deg,rgba(99,40,255,0.8),rgba(0,180,255,0.6)); border-radius:999px; width:0%; transition:width 0.8s ease; }

    .progress-text { font-size:0.75rem; color:rgba(255,255,255,0.25); margin-bottom:0.3rem; }
    .time-text { font-size:0.72rem; color:rgba(255,255,255,0.2); }

    .page-transition { position:fixed; inset:0; background:#05050a; z-index:99999; opacity:0; pointer-events:none; transition:opacity 0.5s ease; }
    .page-transition.active { opacity:1; pointer-events:all; }
  </style>
</head>
<body>

  <div class="page-transition" id="page-transition"></div>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursor-follower"></div>
  <div class="glow-bg"></div>

  <nav>
    <div class="nav-logo">
      TechDebt<span class="accent">.</span>
      <span class="nav-sep">/</span>
      <span class="nav-page">Analyzing</span>
    </div>
  </nav>

  <div class="container">
    <div class="spinner-wrap">
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
      <div class="spinner-icon">⚡</div>
    </div>

    <div class="title">Analyzing Repository</div>
    <div class="repo-name">{{ repo_url }}</div>

    <div class="steps">
      <div class="step" id="step-1"><div class="step-dot"></div><span class="step-icon">📥</span> Cloning repository</div>
      <div class="step" id="step-2"><div class="step-dot"></div><span class="step-icon">📐</span> Running Radon complexity scan</div>
      <div class="step" id="step-3"><div class="step-dot"></div><span class="step-icon">🤖</span> GPT-4o AI code review</div>
      <div class="step" id="step-4"><div class="step-dot"></div><span class="step-icon">🛡️</span> Bandit security scan</div>
      <div class="step" id="step-5"><div class="step-dot"></div><span class="step-icon">📊</span> ML scoring + report generation</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-text" id="progress-text">Starting analysis...</div>
    <div class="time-text" id="time-text">This usually takes 60–90 seconds</div>
  </div>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    const follower = document.getElementById('cursor-follower');
    let mx=0,my=0,fx=0,fy=0;
    document.addEventListener('mousemove', e => {
      mx=e.clientX; my=e.clientY;
      cursor.style.left=mx-5+'px'; cursor.style.top=my-5+'px';
    });
    (function af(){ fx+=(mx-fx)*0.12; fy+=(my-fy)*0.12; follower.style.left=fx-15+'px'; follower.style.top=fy-15+'px'; requestAnimationFrame(af); })();

    const steps = [
      { id:'step-1', label:'Cloning repository...',          progress:10, duration:6000  },
      { id:'step-2', label:'Running complexity scan...',      progress:30, duration:12000 },
      { id:'step-3', label:'AI reviewing code (slowest)...', progress:65, duration:55000 },
      { id:'step-4', label:'Running security scan...',        progress:80, duration:8000  },
      { id:'step-5', label:'Generating ML report...',         progress:95, duration:5000  },
    ];

    const bar  = document.getElementById('progress-bar');
    const text = document.getElementById('progress-text');
    const timeEl = document.getElementById('time-text');

    let elapsed = 0;
    const timer = setInterval(() => {
      elapsed++;
      timeEl.textContent = `${elapsed}s elapsed`;
    }, 1000);

    // Animate steps based on elapsed time
    let cumulative = 0;
    steps.forEach((s, i) => {
      setTimeout(() => {
        // Mark previous done
        if (i > 0) {
          document.getElementById(steps[i-1].id).className = 'step done';
        }
        document.getElementById(s.id).className = 'step active';
        bar.style.width = s.progress + '%';
        text.textContent = s.label;
      }, cumulative);
      cumulative += s.duration;
    });

    // Poll backend status every 2s
    const REPO_URL = "{{ repo_url }}";
    async function checkStatus() {
      try {
        const res  = await fetch('/api/status');
        const data = await res.json();

        if (data.status === 'done') {
          clearInterval(timer);
          // Mark all done
          steps.forEach(s => { document.getElementById(s.id).className = 'step done'; });
          bar.style.width = '100%';
          text.textContent = '✅ Analysis complete! Redirecting...';

          // Fade out and redirect
          setTimeout(() => {
            document.getElementById('page-transition').classList.add('active');
            setTimeout(() => {
              window.location.href = `/results?repo=${encodeURIComponent(REPO_URL)}`;
            }, 500);
          }, 600);

        } else if (data.status && data.status.startsWith('error:')) {
          clearInterval(timer);
          const msg = data.status.replace('error:', '');
          text.textContent = '❌ Analysis failed: ' + msg;
          timeEl.textContent = 'Redirecting back...';
          setTimeout(() => {
            window.location.href = `/analyze?error=${encodeURIComponent(msg)}`;
          }, 2500);
        }
      } catch(e) {}
    }

    // Start polling after 5s (give server time to start)
    setTimeout(() => {
      checkStatus();
      setInterval(checkStatus, 2000);
    }, 5000);
  </script>
</body>
</html>
